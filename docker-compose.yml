name: cuberail

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: cube_user
      POSTGRES_PASSWORD: cube_password
      POSTGRES_DB: cube_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cube_user -d cube_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: cuberail
    restart: unless-stopped
    ports:
      - "8098:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql+asyncpg://cube_user:cube_password@db:5432/cube_db
      - SECRET_KEY=supersecretjwtkeyforproduction
      - CORS_ORIGINS=https://cuberail.onewing.top,https://cube.onewing.top
    env_file:
      - .env

volumes:
  postgres_data:
